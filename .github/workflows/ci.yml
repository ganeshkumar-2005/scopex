name: ScopeX CI

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

jobs:
  test:
    name: Test on ${{ matrix.os }} (Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12"]

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Install System Dependencies (Nmap)
      shell: bash
      run: |
        if [ "$RUNNER_OS" == "Linux" ]; then
          sudo apt-get update
          sudo apt-get install -y nmap
        elif [ "$RUNNER_OS" == "macOS" ]; then
          brew install nmap
        elif [ "$RUNNER_OS" == "Windows" ]; then
          choco install nmap --no-progress -y
          # Add Nmap to PATH for subsequent steps
          echo "C:\Program Files (x86)\Nmap" >> $GITHUB_PATH
        fi

    - name: Install Python Package & Dev Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .[dev]

    - name: Run Test Suite with Coverage
      run: |
        python -m pytest tests/ -v -W ignore --cov=core --cov=scanners --cov=plugins --cov=reports --cov=utils --cov-report=xml

    - name: Upload Coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        fail_ci_if_error: false

  docker-build:
    name: Validate Docker Image Build
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Build Docker Image (Dry Run)
      uses: docker/build-push-action@v4
      with:
        context: .
        push: false
        tags: scopex:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max
